version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: job_market
      MYSQL_USER: jobuser
      MYSQL_PASSWORD: jobpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow

    depends_on:
      postgres:
        condition: service_started

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHONPATH: /opt/airflow/project

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin
      "

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
      PYTHONPATH: /opt/airflow/project

    volumes:
      - ../:/opt/airflow/project
      - ../dags:/opt/airflow/dags

    ports:
      - "8080:8080"

    command: airflow webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
      PYTHONPATH: /opt/airflow/project

    volumes:
      - ../:/opt/airflow/project
      - ../dags:/opt/airflow/dags

    command: airflow scheduler

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit

    restart: always

    depends_on:
      mysql:
        condition: service_started

    ports:
      - "8501:8501"

    volumes:
      - ../:/app

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "7077:7077"
      - "8081:8080"

    volumes:
      - ../:/opt/airflow/project

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    depends_on:
      - spark-master

    volumes:
      - ../:/opt/airflow/project

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    depends_on:
      - spark-master

    volumes:
      - ../:/opt/airflow/project
      
volumes:
  postgres_data:
  mysql_data: