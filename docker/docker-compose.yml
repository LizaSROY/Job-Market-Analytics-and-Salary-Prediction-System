version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data


  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: job_market
      MYSQL_USER: jobuser
      MYSQL_PASSWORD: jobpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql


  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow

    depends_on:
      postgres:
        condition: service_started

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHONPATH: /opt/airflow/project

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin
      "


  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
      PYTHONPATH: /opt/airflow/project

    volumes:
      - ../:/opt/airflow/project
      - ../dags:/opt/airflow/dags

    ports:
      - "8080:8080"

    command: airflow webserver


  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
      PYTHONPATH: /opt/airflow/project

    volumes:
      - ../:/opt/airflow/project
      - ../dags:/opt/airflow/dags

    command: airflow scheduler


  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard

    restart: always

    depends_on:
      mysql:
        condition: service_started

    ports:
      - "5001:5000"

    volumes:
      - ../data:/app/data
  prediction:

    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard

    restart: always

    ports:
      - "5002:5000"

    volumes:
      - ../prediction_app:/app/prediction_app
      - ../ml:/app/ml
      - ../data:/app/data

    command: python prediction_app/app.py


volumes:
  postgres_data:
  mysql_data: