<!DOCTYPE html>

<html>

<head>

<title>Salary Prediction System</title>

<link
rel="stylesheet"
href="{{url_for('static',filename='style.css')}}"
>

</head>

<body>

<div class="layout">

<div class="sidebar">

<h1>

Salary AI

</h1>

<p class="subtitle">

Predict future salaries using machine learning models

</p>


<div class="section">

<h3>

Select Model

</h3>


<label class="model-card">

<input
type="radio"
name="model"
value="LinearRegression"
checked
form="predictionForm"
>

Linear Regression

</label>


<label class="model-card">

<input
type="radio"
name="model"
value="RandomForest"
form="predictionForm"
>

Random Forest

</label>


<label class="model-card">

<input
type="radio"
name="model"
value="GradientBoosting"
form="predictionForm"
>

Gradient Boosting

</label>


</div>

</div>



<div class="content">

<h1>

Predict Future Salary

</h1>


<form
id="predictionForm"
action="/predict"
method="POST"
>

<input
name="experience"
placeholder="Years Experience"
required
>


<input
name="country"
placeholder="Country"
required
>


<input
name="city"
placeholder="City"
required
>


<input
name="occupation"
placeholder="Occupation"
required
>


<input
name="field"
placeholder="Field"
required
>


<select name="employment_type">

<option>full_time</option>
<option>part_time</option>
<option>contract</option>

</select>



<select name="education_level">

<option>high school</option>
<option>bachelor</option>
<option>master</option>
<option>phd</option>

</select>



<select name="gender">

<option>male</option>
<option>female</option>

</select>



<select name="company_size">

<option>small</option>
<option>medium</option>
<option>large</option>

</select>



<select name="experience_level">

<option>entry</option>
<option>mid</option>
<option>senior</option>
<option>executive</option>

</select>



<button>

Predict Salary

</button>


</form>


{% if predicted_salary %}

<div class="result">

<h2>

Predicted Salary

</h2>

<h1>

${{predicted_salary}}

</h1>

<p>

Model Used:

{{selected_model}}

</p>

</div>

{% endif %}


</div>

</div>

</body>

</html>
